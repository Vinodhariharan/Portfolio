<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Blog</title>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6E52VLX2ZZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6E52VLX2ZZ');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="./assets/favicon.png" type="image/png" />
  <link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <meta name="robots" content="noindex, nofollow" />
  <script>tailwind.config = { darkMode: 'class' };</script>
  <style>
    /* Input base style */
    .field {
      width: 100%;
      padding: 0.625rem 1rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      background: var(--bg);
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .field:focus { border-color: var(--accent); }
    textarea.field { resize: vertical; }
  </style>
</head>

<body class="bg-[#f5f5f5] dark:bg-[#0a0a0a] text-[#0a0a0a] dark:text-[#fafafa] min-h-screen transition-colors duration-300">

  <!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->
  <div id="login-section" class="hidden min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm card p-8">
      <div class="text-center mb-8">
        <a href="/" class="text-2xl font-bold text-[#0a0a0a] dark:text-[#fafafa]" style="font-family:'Glacial Indifference',sans-serif;">vh</a>
        <p class="text-sm text-[#737373] mt-2">Blog Admin</p>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-[#737373] mb-1.5">Email</label>
          <input id="login-email" type="email" required autocomplete="email" class="field" placeholder="you@email.com" />
        </div>
        <div>
          <label class="block text-xs font-medium text-[#737373] mb-1.5">Password</label>
          <input id="login-password" type="password" required autocomplete="current-password" class="field" placeholder="••••••••" />
        </div>
        <p id="login-error" class="hidden text-sm text-red-500 bg-red-50 dark:bg-red-900/20 px-3 py-2 rounded-lg"></p>
        <button type="submit" class="btn-primary w-full justify-center">Sign In</button>
      </form>
    </div>
  </div>

  <!-- ── DASHBOARD ─────────────────────────────────────────────────────────── -->
  <div id="dashboard-section" class="hidden">
    <header class="bg-[#ffffff] dark:bg-[#111111] border-b border-[#e5e5e5] dark:border-[#222222] px-6 py-4">
      <div class="max-w-5xl mx-auto flex items-center justify-between">
        <a href="/" class="text-lg font-bold text-[#0a0a0a] dark:text-[#fafafa]" style="font-family:'Glacial Indifference',sans-serif;">vh · Blog Admin</a>
        <div class="flex items-center gap-4">
          <a href="blog.html" target="_blank" class="text-sm text-[#737373] hover:text-[#2563eb] transition-colors">View Blog ↗</a>
          <button id="new-post-btn" class="btn-primary">+ New Post</button>
          <button id="logout-btn" class="btn-ghost text-sm">Sign out</button>
        </div>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-10">
      <div id="dashboard-loading" class="flex justify-center py-16">
        <div class="w-6 h-6 border-2 border-[#2563eb] border-t-transparent rounded-full animate-spin"></div>
      </div>

      <div id="dashboard-empty" class="hidden text-center py-20 text-[#737373]">
        <p class="mb-4">No posts yet.</p>
        <button onclick="openEditor(null)" class="btn-primary">Write your first post</button>
      </div>

      <div id="posts-table-wrapper" class="hidden overflow-hidden rounded-xl border border-[#e5e5e5] dark:border-[#222222]">
        <table class="w-full text-sm">
          <thead class="bg-[#f5f5f5] dark:bg-[#111111] text-[#737373] text-xs uppercase">
            <tr>
              <th class="px-5 py-3 text-left">Title</th>
              <th class="px-5 py-3 text-left">Status</th>
              <th class="px-5 py-3 text-left">Date</th>
              <th class="px-5 py-3 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="posts-table-body" class="divide-y divide-[#e5e5e5] dark:divide-[#222222] bg-[#ffffff] dark:bg-[#0a0a0a]">
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- ── EDITOR ─────────────────────────────────────────────────────────────── -->
  <div id="editor-section" class="hidden">
    <header class="bg-[#ffffff] dark:bg-[#111111] border-b border-[#e5e5e5] dark:border-[#222222] px-6 py-4">
      <div class="max-w-3xl mx-auto flex items-center justify-between">
        <button id="back-to-dashboard" class="flex items-center gap-2 text-sm text-[#737373] hover:text-[#0a0a0a] dark:hover:text-[#fafafa] transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Dashboard
        </button>
        <h2 id="editor-heading" class="text-sm font-semibold text-[#0a0a0a] dark:text-[#fafafa]">New Post</h2>
        <div class="flex gap-2">
          <button id="save-draft-btn" class="btn-ghost text-sm">Save Draft</button>
          <button id="save-publish-btn" class="btn-primary text-sm">Publish</button>
        </div>
      </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-10 space-y-6">
      <input type="hidden" id="edit-post-id" />

      <!-- Title -->
      <div>
        <label class="block text-xs font-medium text-[#737373] mb-1.5">Title</label>
        <input id="post-title-input" type="text" placeholder="Post title…"
          class="field text-xl font-semibold" />
      </div>

      <!-- Slug -->
      <div>
        <label class="block text-xs font-medium text-[#737373] mb-1.5">Slug</label>
        <div class="flex gap-2">
          <input id="post-slug-input" type="text" placeholder="post-slug"
            class="field font-mono flex-1" />
          <button id="regen-slug-btn" title="Regenerate from title"
            class="btn-ghost px-3 text-sm shrink-0">↺</button>
        </div>
        <p class="text-xs text-[#737373] mt-1">
          URL: /post/<span id="slug-preview" class="font-mono text-[#2563eb]">…</span>
        </p>
      </div>

      <!-- Excerpt -->
      <div>
        <label class="block text-xs font-medium text-[#737373] mb-1.5">Excerpt</label>
        <textarea id="post-excerpt-input" rows="2" placeholder="Short description shown on the blog listing…"
          class="field"></textarea>
      </div>

      <!-- Cover Image -->
      <div>
        <label class="block text-xs font-medium text-[#737373] mb-1.5">Cover Image</label>
        <div class="flex items-center gap-3">
          <label for="cover-upload-input" class="btn-ghost text-sm cursor-pointer">↑ Upload Cover</label>
          <input id="cover-upload-input" type="file" accept="image/*" class="hidden" />
          <span id="cover-upload-status" class="text-xs text-[#737373]"></span>
        </div>
        <div id="cover-preview-wrap" class="hidden mt-3">
          <img id="cover-preview" src="" alt="Cover preview" class="w-full max-h-48 object-cover rounded-lg border border-[#e5e5e5] dark:border-[#222222]" />
          <button id="cover-remove-btn" class="mt-2 text-xs text-red-500 hover:underline">Remove cover image</button>
        </div>
        <input type="hidden" id="cover-image-url" />
      </div>

      <!-- Image upload -->
      <div>
        <label class="block text-xs font-medium text-[#737373] mb-1.5">Insert Image</label>
        <div class="flex items-center gap-3">
          <label for="image-upload-input" class="btn-ghost text-sm cursor-pointer">
            ↑ Upload Image
          </label>
          <input id="image-upload-input" type="file" accept="image/*" class="hidden" />
          <span id="upload-status" class="text-xs text-[#737373]"></span>
        </div>
        <p class="text-xs text-[#737373] mt-1">Image is uploaded and the markdown link is inserted at your cursor.</p>
      </div>

      <!-- Content -->
      <div>
        <label class="block text-xs font-medium text-[#737373] mb-1.5">Content (Markdown)</label>
        <textarea id="post-content-input" rows="22" placeholder="Write in Markdown…&#10;&#10;## Heading&#10;**bold**, *italic*, `code`&#10;&#10;![Image](url)"
          class="field font-mono text-sm"></textarea>
      </div>

      <!-- Messages -->
      <p id="editor-error" class="hidden text-sm text-red-600 bg-red-50 dark:bg-red-900/20 px-4 py-3 rounded-lg"></p>
      <p id="editor-success" class="hidden text-sm text-green-600 bg-green-50 dark:bg-green-900/20 px-4 py-3 rounded-lg"></p>
    </main>
  </div>

  <!-- ── DELETE MODAL ───────────────────────────────────────────────────────── -->
  <div id="delete-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="card max-w-sm w-full mx-4 p-8 text-center">
      <p class="text-base font-semibold text-[#0a0a0a] dark:text-[#fafafa] mb-2">Delete this post?</p>
      <p class="text-sm text-[#737373] mb-7">This cannot be undone.</p>
      <div class="flex gap-3">
        <button id="cancel-delete-btn" class="btn-ghost flex-1 justify-center">Cancel</button>
        <button id="confirm-delete-btn"
          class="flex-1 inline-flex items-center justify-center gap-2 px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium transition-colors cursor-pointer">
          Delete
        </button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    // Apply saved dark mode preference
    const saved = localStorage.getItem('darkMode');
    const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
    if (saved === 'enabled' || (saved === null && prefersDark)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</body>
</html>
